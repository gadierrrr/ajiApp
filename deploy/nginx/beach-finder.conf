server {
    listen 80;
    server_name puertoricobeachfinder.com www.puertoricobeachfinder.com;

    root /var/www/beach-finder/public;
    index index.php index.html;

    # Security hardening: block sensitive paths/files
    location ~ /\.(?!well-known) {
        return 404;
    }

    location ~* /\.env {
        return 404;
    }

    location ~* ^/(data|migrations|scripts|inc|components|templates|config|docs|\.git|\.github|\.claude)(/|$) {
        return 404;
    }

    # Never execute PHP from uploads.
    location ~* ^/uploads/.*\.php$ {
        return 404;
    }

    # Serve uploads from outside docroot (static only)
    # NOTE: use ^~ so the generic static-file regex location doesn't bypass this alias.
    location ^~ /uploads/ {
        alias /var/www/beach-finder/uploads/;
        autoindex off;

        try_files $uri $uri/ =404;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Friendly error pages
    error_page 404 /errors/404.php;
    error_page 500 502 503 504 /errors/500.php;

    location = /errors/404.php {
        internal;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "open_basedir=/var/www/beach-finder:/tmp";
        include fastcgi_params;
    }

    location = /errors/500.php {
        internal;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "open_basedir=/var/www/beach-finder:/tmp";
        include fastcgi_params;
    }

    # Municipality landing pages (ASCII slugs only)
    location ~ ^/beaches-in-([a-z-]+)$ {
        rewrite ^/beaches-in-([a-z-]+)$ /municipality.php?m=$1 last;
    }

    # Redirect accented municipality URLs to homepage (e.g., /beaches-in-guánica)
    # These don't match the [a-z-] regex above, so catch them here to avoid 404s.
    location ~ ^/beaches-in- {
        return 301 /;
    }

    # Beach detail pages
    location ~ ^/beach/([a-z0-9-]+)$ {
        rewrite ^/beach/([a-z0-9-]+)$ /beach.php?slug=$1 last;
    }

    # Referral redirect pages
    location ~ ^/go/([a-z0-9-]+)$ {
        rewrite ^/go/([a-z0-9-]+)$ /go.php?c=$1 last;
    }

    # Guide routing through CMS router (falls back to legacy templates when no CMS article exists)
    location ~ ^/guides/([a-z0-9-]+)$ {
        rewrite ^/guides/([a-z0-9-]+)$ /guides/cms-router.php?slug=$1 last;
    }

    # Spanish localized routes (static + dynamic)
    location = /es {
        rewrite ^ /index.php last;
    }
    location = /es/ {
        rewrite ^ /index.php last;
    }
    location = /es/quiz-playa {
        rewrite ^ /quiz.php last;
    }
    location = /es/resultados-quiz-playa {
        rewrite ^ /quiz-results.php last;
    }
    location = /es/comparar-playas {
        rewrite ^ /compare.php last;
    }
    location = /es/mejores-playas {
        rewrite ^ /best-beaches.php last;
    }
    location = /es/mejores-playas-san-juan {
        rewrite ^ /best-beaches-san-juan.php last;
    }
    location = /es/mejores-playas-para-snorkel {
        rewrite ^ /best-snorkeling-beaches.php last;
    }
    location = /es/mejores-playas-para-surf {
        rewrite ^ /best-surfing-beaches.php last;
    }
    location = /es/mejores-playas-familiares {
        rewrite ^ /best-family-beaches.php last;
    }
    location = /es/playas-cerca-de-san-juan {
        rewrite ^ /beaches-near-san-juan.php last;
    }
    location = /es/playas-cerca-del-aeropuerto-san-juan {
        rewrite ^ /beaches-near-san-juan-airport.php last;
    }
    location = /es/playas-escondidas-puerto-rico {
        rewrite ^ /hidden-beaches-puerto-rico.php last;
    }
    location = /es/guias {
        rewrite ^ /guides/index.php last;
    }
    location = /es/guias/ {
        rewrite ^ /guides/index.php last;
    }
    location = /es/guias/llegar-a-playas-de-puerto-rico {
        rewrite ^ /guides/cms-router.php?slug=getting-to-puerto-rico-beaches last;
    }
    location = /es/guias/consejos-seguridad-playa {
        rewrite ^ /guides/cms-router.php?slug=beach-safety-tips last;
    }
    location = /es/guias/mejor-epoca-visitar-playas-puerto-rico {
        rewrite ^ /guides/cms-router.php?slug=best-time-visit-puerto-rico-beaches last;
    }
    location = /es/guias/lista-empaque-playa {
        rewrite ^ /guides/cms-router.php?slug=beach-packing-list last;
    }
    location = /es/guias/culebra-vs-vieques {
        rewrite ^ /guides/cms-router.php?slug=culebra-vs-vieques last;
    }
    location = /es/guias/bahias-bioluminiscentes {
        rewrite ^ /guides/cms-router.php?slug=bioluminescent-bays last;
    }
    location = /es/guias/guia-snorkel {
        rewrite ^ /guides/cms-router.php?slug=snorkeling-guide last;
    }
    location = /es/guias/guia-surf {
        rewrite ^ /guides/cms-router.php?slug=surfing-guide last;
    }
    location = /es/guias/consejos-fotografia-playa {
        rewrite ^ /guides/cms-router.php?slug=beach-photography-tips last;
    }
    location = /es/guias/planificacion-vacaciones-familia-playa {
        rewrite ^ /guides/cms-router.php?slug=family-beach-vacation-planning last;
    }
    location = /es/guias/playas-spring-break-puerto-rico {
        rewrite ^ /guides/cms-router.php?slug=spring-break-beaches-puerto-rico last;
    }
    location = /es/sin-conexion {
        rewrite ^ /offline.php last;
    }
    location = /es/iniciar-sesion {
        rewrite ^ /login.php last;
    }
    location = /es/cerrar-sesion {
        rewrite ^ /logout.php last;
    }
    location = /es/verificar {
        rewrite ^ /verify.php last;
    }
    location = /es/favoritos {
        rewrite ^ /favorites.php last;
    }
    location = /es/perfil {
        rewrite ^ /profile.php last;
    }
    location = /es/bienvenida {
        rewrite ^ /onboarding.php last;
    }
    location = /es/terminos {
        rewrite ^ /terms.php last;
    }
    location = /es/privacidad {
        rewrite ^ /privacy.php last;
    }
    location ~ ^/es/playa/([a-z0-9-]+)$ {
        rewrite ^/es/playa/([a-z0-9-]+)$ /beach.php?slug=$1 last;
    }
    location ~ ^/es/playas-en-([a-z-]+)$ {
        rewrite ^/es/playas-en-([a-z-]+)$ /municipality.php?m=$1 last;
    }
    # Redirect accented Spanish municipality URLs (e.g., /es/playas-en-guánica)
    location ~ ^/es/playas-en- {
        return 301 /es;
    }

    # Public sitemap URL
    location = /sitemap.xml {
        rewrite ^ /sitemap.php last;
    }

    # Canonical redirects: remove trailing slash on extensionless URLs.
    # Keep /guides/ and /es/guias/ as directory-style canonical URLs.
    if ($request_uri ~ ^/(best-beaches|best-beaches-san-juan|best-snorkeling-beaches|best-surfing-beaches|best-family-beaches|beaches-near-san-juan|beaches-near-san-juan-airport|hidden-beaches-puerto-rico|quiz|quiz-results|compare|offline|login|logout|verify|favorites|profile|onboarding|terms|privacy|go|beach/[a-z0-9-]+|beaches-in-[a-z-]+|guides/[a-z0-9-]+|es|es/quiz-playa|es/resultados-quiz-playa|es/comparar-playas|es/mejores-playas|es/mejores-playas-san-juan|es/mejores-playas-para-snorkel|es/mejores-playas-para-surf|es/mejores-playas-familiares|es/playas-cerca-de-san-juan|es/playas-cerca-del-aeropuerto-san-juan|es/playas-escondidas-puerto-rico|es/sin-conexion|es/iniciar-sesion|es/cerrar-sesion|es/verificar|es/favoritos|es/perfil|es/bienvenida|es/terminos|es/privacidad|es/playa/[a-z0-9-]+|es/playas-en-[a-z-]+|es/guias/[a-z0-9-]+)/+($|\?)) {
        return 301 /$1$is_args$args;
    }

    # Canonical redirects: .php -> extensionless public URLs (external requests only).
    # Keep these in server-rewrite phase so internal extensionless rewrites do not loop.
    if ($request_uri ~ ^/(best-beaches|best-beaches-san-juan|best-snorkeling-beaches|best-surfing-beaches|best-family-beaches|beaches-near-san-juan|beaches-near-san-juan-airport|hidden-beaches-puerto-rico)\.php($|\?)) {
        return 301 /$1$is_args$args;
    }

    if ($request_uri ~ ^/(quiz|quiz-results|compare|offline|login|logout|verify|favorites|profile|onboarding|terms|privacy|go)\.php($|\?)) {
        return 301 /$1$is_args$args;
    }

    if ($request_uri ~ ^/guides/index\.php($|\?)) {
        return 301 /guides/$is_args$args;
    }

    if ($request_uri ~ ^/guides/([a-z0-9-]+)\.php($|\?)) {
        return 301 /guides/$1$is_args$args;
    }

    if ($request_uri ~ ^/admin/index\.php($|\?)) {
        return 301 /admin$is_args$args;
    }

    if ($request_uri ~ ^/admin/(beaches|reviews|users|emails|place-id-audit|referrals)\.php($|\?)) {
        return 301 /admin/$1$is_args$args;
    }

    location / {
        try_files $uri $uri/ @extensionless_or_index;
    }

    location @extensionless_or_index {
        if (-f $document_root$uri.php) {
            rewrite ^ $uri.php last;
        }

        rewrite ^ /index.php?$query_string last;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "open_basedir=/var/www/beach-finder:/tmp";
        include fastcgi_params;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
